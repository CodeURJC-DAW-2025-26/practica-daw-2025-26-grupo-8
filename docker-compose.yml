version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pizzeria-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: pizzeria
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pizzeria-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pizzeria-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pizzeria
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8443:8443"
    networks:
      - pizzeria-network

volumes:
  mysql_data:

networks:
  pizzeria-network:
    driver: bridge
